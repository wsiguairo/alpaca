<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Open Graph tags para WhatsApp -->
    <meta property="og:title" content="🦙 Monitoreo de Alpacas 2026">
    <meta property="og:description" content="Sistema de monitoreo de afectación por frío en alpacas - Sierra Sur">
    <meta property="og:image" content="https://wsiguairo.github.io/alpaca/alpaca.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://wsiguairo.github.io/alpaca/">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="🦙 Monitoreo de Alpacas 2026">
    <meta name="twitter:description" content="Sistema de monitoreo de afectación por frío - Sierra Sur">
    <meta name="twitter:image" content="https://wsiguairo.github.io/alpaca/alpaca.png">
    
    <title>Monitoreo de Alpacas 2026</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .alpaca-img {
            max-width: 400px;
            width: 100%;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px; 
        }
        .subtitle { 
            color: #666; 
            margin-bottom: 30px; 
        }
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            flex: 1;
            min-width: 200px;
            max-width: 350px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-whatsapp {
            background: #FF8C00;
            color: white;
        }
        .btn-update {
            background: #e0e0e0;
            color: #333;
        }
        .btn-senamhi {
            background: #e0e0e0;
            color: #333;
        }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
        }
        .app-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .app-link:hover {
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="alpaca.png" alt="Alpaca" class="alpaca-img">
        <h1>🦙 Monitoreo de Alpacas 2026</h1>
        <p class="subtitle">Sistema de monitoreo de afectación por frío - Sierra Sur</p>
        
        <!-- 3 BOTONES -->
        <div class="button-container">
            <button class="btn btn-whatsapp" onclick="compartirWhatsApp()">
                📱 Compartir en WhatsApp
            </button>
            <button class="btn btn-update" onclick="actualizarDatos()">
                🔄 Actualizar Datos
            </button>
            <button class="btn btn-senamhi" onclick="verSenamhi()">
                🌤️ Ver Reporte SENAMHI
            </button>
        </div>
        
        <!-- Enlace a la app de Hugging Face -->
        <a href="https://huggingface.co/spaces/wsiguairo/alpacas-2026" class="app-link" target="_blank">
            🚀 Acceder a la App Interactiva
        </a>
        
        <div class="info">
            <p><strong>📌 Nota:</strong> Al compartir por WhatsApp, se mostrará la vista previa con la imagen de alpaca.png</p>
            <p style="margin-top: 10px;">Fecha: <span id="fecha"></span></p>
        </div>
    </div>
    
    <script>
        // Mostrar fecha actual
        document.getElementById('fecha').textContent = new Date().toLocaleDateString('es-PE', {
            day: 'numeric',
            month: 'long',
            year: 'numeric'
        });
        
        // Función Compartir en WhatsApp
        function compartirWhatsApp() {
            const fecha = new Date().toLocaleDateString('es-PE', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            const url = window.location.href;
            const texto = `🦙 *Monitoreo de Alpacas 2026*\n\n📅 Fecha: ${fecha}\n\n📊 Visualiza la gráfica actualizada del monitoreo de alpacas en la Sierra Sur.\n\n🔗 ${url}`;
            const whatsappUrl = `https://wa.me/?text=${encodeURIComponent(texto)}`;
            window.open(whatsappUrl, '_blank');
        }
        
        // Función Actualizar Datos
        function actualizarDatos() {
            location.reload();
        }
        
        // Función Ver SENAMHI
        function verSenamhi() {
            window.open('https://www.gob.pe/institucion/senamhi/informes-publicaciones/7683884-monitoreo-de-confort-climatico-de-alpacas-febrero-2026', '_blank');
        }
    </script>
</body>
</html>
