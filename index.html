<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpaca.png</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .alpaca-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .alpaca-img:hover { transform: scale(1.02); }
        h1 { color: #667eea; margin: 20px 0 10px; font-size: 1.8em; }
        p { color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 🔗 Click para ver alpaca.png en tamaño real -->
        <a href="https://wsiguairo.github.io/monitoreo-alpacas-2026/alpaca.png" target="_blank">
            <img src="https://wsiguairo.github.io/monitoreo-alpacas-2026/alpaca.png" 
                 alt="Alpaca" 
                 class="alpaca-img">
        </a>
        <h1>Alpaca.png</h1>
        <p>Haz clic en la imagen para verla en tamaño completo.</p>
    </div>
</body>
</html>
